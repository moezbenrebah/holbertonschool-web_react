<mat-toolbar color="primary">
  <span>Travel Buddy - Ajouter un profil de guide</span>
  <nav>
    <ul>
      <li><a routerLink="/">Accueil</a></li>
      <li><a routerLink="/connexion">Connexion</a></li>
      <li><a routerLink="/inscription">Inscription</a></li>
      <li><a routerLink="/ajouter-profil">Devenir Guide</a></li>
    </ul>
  </nav>
</mat-toolbar>

<section class="ajouter-profil">
  <div class="container">
    <h2>Ajouter un profil de guide</h2>
    <form (ngSubmit)="onSubmit(f, $event)" #f="ngForm">

      <mat-form-field appearance="outline">
        <mat-label for="nom">Nom</mat-label>
        <input matInput type="text" id="nom" name="nom" required>
      </mat-form-field><br>

      <mat-form-field appearance="outline">
        <mat-label for="prenom">Prénom</mat-label>
        <input matInput type="text" id="prenom" name="prenom" required>
      </mat-form-field><br>

      <mat-form-field appearance="outline">
        <mat-label for="email">Email</mat-label>
        <input matInput type="email" id="email" name="email" required>
      </mat-form-field><br>

      <mat-form-field appearance="outline">
        <mat-label for="specialites">Spécialités (séparées par des virgules)</mat-label>
        <input matInput type="text" id="specialites" name="specialites">
      </mat-form-field><br>

      <mat-form-field appearance="outline">
        <mat-label for="destinations">Destinations (séparées par des virgules)</mat-label>
        <input matInput type="text" id="destinations" name="destinations">
      </mat-form-field><br>

      <mat-form-field appearance="outline">
        <mat-label for="langues">Langues parlées (séparées par des virgules)</mat-label>
        <input matInput type="text" id="langues" name="langues">
      </mat-form-field><br>

      <mat-form-field appearance="outline">
        <mat-label for="description">Description</mat-label>
        <textarea matInput id="description" name="description"></textarea>
      </mat-form-field><br>

      <button mat-raised-button color="primary" type="submit">Ajouter profil</button>
    </form>
  </div>
</section>
