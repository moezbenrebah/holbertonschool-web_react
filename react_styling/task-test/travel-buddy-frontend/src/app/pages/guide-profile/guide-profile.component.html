<div class="container mt-5">
  <div *ngIf="guide" class="guide-profile">
    <div class="profile-header text-center">
      <div class="profile-image" [style.backgroundImage]="'url(' + guide.imageUrl + ')'"></div>
      <h1>{{ guide.prenom }} {{ guide.nom }}</h1>
      <p class="text-muted">{{ guide.city }}</p>
    </div>

    <div class="profile-details mt-4">
      <h2>À propos</h2>
      <p>{{ guide.description }}</p>

      <h3>Spécialités</h3>
      <ul>
        <li *ngFor="let specialty of guide.specialites">{{ specialty }}</li>
      </ul>

      <h3>Destinations</h3>
      <ul>
        <li *ngFor="let destination of guide.destinations">{{ destination }}</li>
      </ul>

      <h3>Langues Parlées</h3>
      <ul>
        <li *ngFor="let language of guide.langues">{{ language }}</li>
      </ul>

      <h3>Publications</h3>
      <div class="publications">
        <div *ngFor="let post of guide.publications" class="publication-card">
          <h4>{{ post.title }}</h4>
          <p>{{ post.description }}</p>
        </div>
      </div>
    </div>
  </div>

  <p *ngIf="!guide" class="text-center">Chargement...</p>
</div>
