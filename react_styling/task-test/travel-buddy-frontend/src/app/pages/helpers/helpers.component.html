<section class="guides">
  <div class="container">
    <h2>Nos Guides</h2>

    <div *ngFor="let guide of filteredHelpers" class="guide">
      <h3>{{ guide.prenom }} {{ guide.nom }}</h3>
      <p>{{ guide.description }}</p>
      <button [routerLink]="['/guide-profile', guide.id]" class="btn btn-primary">
        Voir le Profil
      </button>
    </div>

  </div>
</section>
