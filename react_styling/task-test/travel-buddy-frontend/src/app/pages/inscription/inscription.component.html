<section class="inscription">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="text-center mb-4">Inscription</h2>
            
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
              <div class="form-group mb-3">
                <label for="nom">Nom</label>
                <input 
                  id="nom" 
                  formControlName="nom" 
                  type="text" 
                  class="form-control" 
                  [class.is-invalid]="registerForm.get('nom')?.invalid && registerForm.get('nom')?.touched"
                />
                <div class="invalid-feedback" *ngIf="registerForm.get('nom')?.invalid && registerForm.get('nom')?.touched">
                  Le nom est requis
                </div>
              </div>
              
              <div class="form-group mb-3">
                <label for="prenom">Prénom</label>
                <input 
                  id="prenom" 
                  formControlName="prenom" 
                  type="text" 
                  class="form-control"
                  [class.is-invalid]="registerForm.get('prenom')?.invalid && registerForm.get('prenom')?.touched"
                />
                <div class="invalid-feedback" *ngIf="registerForm.get('prenom')?.invalid && registerForm.get('prenom')?.touched">
                  Le prénom est requis
                </div>
              </div>
              
              <div class="form-group mb-3">
                <label for="email">Email</label>
                <input 
                  id="email" 
                  formControlName="email" 
                  type="email" 
                  class="form-control"
                  [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
                />
                <div class="invalid-feedback" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                  Veuillez saisir une adresse email valide
                </div>
              </div>
              
              <div class="form-group mb-3">
                <label for="password">Mot de passe</label>
                <input 
                  id="password" 
                  formControlName="password" 
                  type="password" 
                  class="form-control"
                  [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
                />
                <div class="invalid-feedback" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                  Le mot de passe doit contenir au moins 6 caractères
                </div>
              </div>
              
              <div class="form-group mb-3">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input 
                  id="confirmPassword" 
                  formControlName="confirmPassword" 
                  type="password" 
                  class="form-control"
                  [class.is-invalid]="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched"
                />
                <div class="invalid-feedback" *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
                  Les mots de passe ne correspondent pas
                </div>
              </div>
              
              <button 
                type="submit" 
                class="btn btn-primary w-100" 
                [disabled]="isSubmitting"
              >
                <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                S'inscrire
              </button>
              
              <div *ngIf="errorMessage" class="alert alert-danger mt-3">
                {{ errorMessage }}
              </div>
            </form>

            <div class="text-center mt-3">
              <p>Déjà inscrit ? <a routerLink="/connexion">Connectez-vous</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
