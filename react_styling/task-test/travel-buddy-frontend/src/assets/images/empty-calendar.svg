<?xml version="1.0" encoding="UTF-8"?>
<svg width="200px" height="200px" viewBox="0 0 200 200" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g transform="translate(25, 25)" fill-rule="nonzero">
            <rect fill="#E6E6E6" x="0" y="10" width="150" height="140" rx="8"></rect>
            <rect fill="#FFFFFF" x="10" y="20" width="130" height="120" rx="4"></rect>
            <rect fill="#3498DB" x="0" y="0" width="150" height="30" rx="4"></rect>
            
            <!-- Calendar grid lines -->
            <line x1="10" y1="60" x2="140" y2="60" stroke="#E6E6E6" stroke-width="2"></line>
            <line x1="10" y1="90" x2="140" y2="90" stroke="#E6E6E6" stroke-width="2"></line>
            <line x1="10" y1="120" x2="140" y2="120" stroke="#E6E6E6" stroke-width="2"></line>
            <line x1="48" y1="30" x2="48" y2="140" stroke="#E6E6E6" stroke-width="2"></line>
            <line x1="86" y1="30" x2="86" y2="140" stroke="#E6E6E6" stroke-width="2"></line>
            <line x1="124" y1="30" x2="124" y2="140" stroke="#E6E6E6" stroke-width="2"></line>
            
            <!-- Day names -->
            <text font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF">
                <tspan x="20" y="20">M</tspan>
            </text>
            <text font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF">
                <tspan x="58" y="20">T</tspan>
            </text>
            <text font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF">
                <tspan x="96" y="20">W</tspan>
            </text>
            <text font-family="Arial" font-size="11" font-weight="bold" fill="#FFFFFF">
                <tspan x="133" y="20">T</tspan>
            </text>
            
            <!-- Empty state icon -->
            <circle cx="75" cy="80" r="25" fill="#F2F2F2"></circle>
            <g transform="translate(60, 65)">
                <path d="M30,10 L15,25 L5,15" stroke="#CCCCCC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
            </g>
        </g>
    </g>
</svg>